version: '3.8'
x-airflow-common:
  &airflow-common
  build: .
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    DBT_PROFILES_DIR: /opt/airflow/dbt/proyecto_unl
  volumes:
    - ./dags:/opt/airflow/dags
    - ./data_lake:/opt/airflow/data_lake
    - ./dbt:/opt/airflow/dbt
  user: "${AIRFLOW_UID:-50000}:0"

services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"

  postgres_warehouse:
    image: postgres:13
    environment:
      POSTGRES_USER: user_dbt
      POSTGRES_PASSWORD: password_dbt
      POSTGRES_DB: db_warehouse
    ports:
      - "5433:5432"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      - postgres

